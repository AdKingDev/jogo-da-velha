<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogo da Velha</title>

    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="shortcut icon" href="./assets/images/jogo-da-velha.png" type="image/x-icon">
</head>
<body>
    <!-- Tabuleiro do jogo -->
    <div class="container x" data-board>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
        <div class="cell" data-cell></div>
    </div>

    <!-- Mensagem de resultado -->
    <div class="winning-message" data-winning-message>
        <p class="winning-message-texto" data-winning-message-text>X Venceu!</p>
        <button class="winning-message-botao" data-restart-button>Reiniciar</button>
    </div>

    <!-- Placar do jogo -->
    <div class="score">
        <p>Jogador: <span class="playerScore">0</span></p>
        <p>CPU: <span class="cpuScore">0</span></p>
    </div>

    <!-- Créditos -->
    <footer>
        <p>Desenvolvido por <a href="https://www.linkedin.com/in/adrianojuniorodrigues/" target="_blank">@adking.dev</a></p>
    </footer>
</body>

<!-- Script do projeto -->
<script src="./assets/javascript/script.js"></script>
</html>
